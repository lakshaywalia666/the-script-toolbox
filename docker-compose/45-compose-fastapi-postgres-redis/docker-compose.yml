services:
  api:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    ports: ["8000:80"]
    depends_on: [postgres, redis]
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: change-me
  redis:
    image: redis:7-alpine
