services:
  node:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports: ["3000:3000"]
    volumes: ["./app:/app"]
    depends_on: [postgres]
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: change-me
